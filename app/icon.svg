        fill="white" fill-opacity="0.1"/>

  <!-- Checkmark -->
  <path d="M12.5 17.5l2.8 2.8 5.7-6.2"
        stroke="white" stroke-width="2.1"
        stroke-linecap="round" stroke-linejoin="round"
        fill="none"/>
