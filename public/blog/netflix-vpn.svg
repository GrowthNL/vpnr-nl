<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0a0a1e"/>
      <stop offset="100%" stop-color="#1e1b4b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Monitor frame -->
  <rect x="255" y="118" width="690" height="420" rx="20" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
  <!-- Screen inset -->
  <rect x="275" y="138" width="650" height="378" rx="12" fill="rgba(0,0,0,0.28)"/>
  <!-- Fake UI header lines -->
  <rect x="315" y="173" width="220" height="9" rx="4" fill="rgba(255,255,255,0.07)"/>
  <rect x="315" y="194" width="155" height="6" rx="3" fill="rgba(255,255,255,0.05)"/>
  <!-- Play button -->
  <circle cx="600" cy="335" r="68" fill="rgba(220,57,64,0.15)" stroke="rgba(220,57,64,0.4)" stroke-width="2"/>
  <polygon points="578,302 650,335 578,368" fill="rgba(255,255,255,0.8)"/>
  <!-- Progress bar -->
  <rect x="275" y="488" width="650" height="4" rx="2" fill="rgba(255,255,255,0.05)"/>
  <rect x="275" y="488" width="285" height="4" rx="2" fill="rgba(220,57,64,0.65)"/>
  <!-- Monitor stand -->
  <rect x="560" y="538" width="80" height="13" rx="5" fill="rgba(255,255,255,0.05)"/>
  <rect x="518" y="551" width="164" height="8" rx="4" fill="rgba(255,255,255,0.04)"/>
  <!-- VPN badge (top-right) -->
  <path d="M852 88 L912 68 L972 88 L972 152 Q972 193 912 218 Q852 193 852 152 Z" fill="rgba(34,197,94,0.12)" stroke="rgba(34,197,94,0.45)" stroke-width="2"/>
  <polyline points="872,136 900,163 952,111" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Glow orbs -->
  <circle cx="120" cy="505" r="140" fill="rgba(220,57,64,0.05)"/>
  <circle cx="1100" cy="148" r="100" fill="rgba(99,102,241,0.06)"/>
</svg>
