<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="screenGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(49,46,129,0.3)"/>
      <stop offset="100%" stop-color="rgba(30,27,75,0.5)"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Shield (left) -->
  <path d="M240 152 L345 182 L345 318 Q345 398 240 435 Q135 398 135 318 L135 182 Z"
        fill="rgba(99,102,241,0.15)" stroke="rgba(99,102,241,0.55)" stroke-width="2"/>
  <!-- Checkmark in shield -->
  <polyline points="172,300 218,343 308,258" fill="none" stroke="rgba(255,255,255,0.8)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Connection line: shield → laptop -->
  <line x1="347" y1="295" x2="490" y2="320" stroke="rgba(99,102,241,0.5)" stroke-width="2" stroke-dasharray="10,6"/>
  <circle cx="390" cy="305" r="4" fill="rgba(129,140,248,0.6)"/>
  <circle cx="445" cy="314" r="3" fill="rgba(129,140,248,0.5)"/>

  <!-- Laptop screen -->
  <rect x="490" y="150" width="630" height="380" rx="12" fill="url(#screenGrad)" stroke="rgba(99,102,241,0.45)" stroke-width="2"/>
  <!-- Screen bezel -->
  <rect x="503" y="163" width="604" height="354" rx="6" fill="rgba(0,0,0,0.4)"/>

  <!-- Windows logo on screen (4 colored tiles in 2x2 grid) -->
  <!-- Red tile (top-left) -->
  <rect x="567" y="255" width="80" height="72" rx="4" fill="rgba(239,68,68,0.75)"/>
  <!-- Green tile (top-right) -->
  <rect x="657" y="255" width="80" height="72" rx="4" fill="rgba(34,197,94,0.75)"/>
  <!-- Blue tile (bottom-left) -->
  <rect x="567" y="337" width="80" height="72" rx="4" fill="rgba(59,130,246,0.75)"/>
  <!-- Yellow tile (bottom-right) -->
  <rect x="657" y="337" width="80" height="72" rx="4" fill="rgba(234,179,8,0.75)"/>
  <!-- Gap between tiles -->
  <rect x="651" y="252" width="12" height="160" rx="2" fill="rgba(0,0,0,0.4)"/>
  <rect x="561" y="330" width="178" height="10" rx="2" fill="rgba(0,0,0,0.4)"/>

  <!-- Taskbar at bottom of screen -->
  <rect x="503" y="489" width="604" height="28" rx="3" fill="rgba(30,27,75,0.7)"/>
  <!-- Start button (Windows logo, small) -->
  <rect x="520" y="496" width="14" height="6" rx="1" fill="rgba(239,68,68,0.6)"/>
  <rect x="536" y="496" width="14" height="6" rx="1" fill="rgba(34,197,94,0.6)"/>
  <rect x="520" y="504" width="14" height="6" rx="1" fill="rgba(59,130,246,0.6)"/>
  <rect x="536" y="504" width="14" height="6" rx="1" fill="rgba(234,179,8,0.6)"/>
  <!-- Search bar -->
  <rect x="562" y="497" width="120" height="16" rx="8" fill="rgba(255,255,255,0.07)"/>
  <!-- VPN indicator in taskbar -->
  <circle cx="1075" cy="503" r="6" fill="rgba(99,102,241,0.8)"/>
  <circle cx="1075" cy="503" r="3.5" fill="rgba(199,210,254,0.9)"/>

  <!-- Laptop base/keyboard -->
  <rect x="465" y="530" width="680" height="36" rx="6" fill="rgba(49,46,129,0.4)" stroke="rgba(99,102,241,0.35)" stroke-width="1.5"/>
  <rect x="555" y="537" width="500" height="8" rx="4" fill="rgba(99,102,241,0.15)"/>
  <!-- Touchpad -->
  <rect x="720" y="540" width="170" height="18" rx="4" fill="rgba(99,102,241,0.18)" stroke="rgba(99,102,241,0.3)" stroke-width="1"/>

  <!-- Additional screen content (taskbar apps) -->
  <circle cx="597" cy="503" r="5" fill="rgba(255,255,255,0.1)"/>
  <circle cx="614" cy="503" r="5" fill="rgba(255,255,255,0.1)"/>
  <circle cx="631" cy="503" r="5" fill="rgba(255,255,255,0.1)"/>

  <!-- Decorative elements -->
  <circle cx="100" cy="500" r="4" fill="rgba(129,140,248,0.3)"/>
  <circle cx="80" cy="420" r="3" fill="rgba(129,140,248,0.25)"/>
  <circle cx="1100" cy="150" r="4.5" fill="rgba(129,140,248,0.3)"/>
  <circle cx="1130" cy="480" r="3" fill="rgba(129,140,248,0.25)"/>
  <circle cx="400" cy="540" r="3.5" fill="rgba(129,140,248,0.2)"/>
</svg>
