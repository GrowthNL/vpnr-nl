<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="proton-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6D4AFF"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#00D2C6"/>
    </linearGradient>
    <linearGradient id="proton-inner" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B6FFF"/>
      <stop offset="100%" stop-color="#4AC8C0"/>
    </linearGradient>
  </defs>
  <rect width="200" height="200" fill="white"/>
  <!-- Outer downward-pointing triangle (left portion) -->
  <path d="M20 35 L120 35 L100 165 L20 35 Z" fill="url(#proton-grad)"/>
  <!-- Inner overlapping triangle (right portion, lighter) -->
  <path d="M80 35 L180 35 L100 165 Z" fill="url(#proton-inner)" opacity="0.85"/>
</svg>
